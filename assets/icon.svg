<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#080a10"/>
  <rect x="20" y="20" width="472" height="472" rx="65" fill="#0e1018"/>
  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#00e5ff" stroke-width="3" opacity="0.3"/>
  <!-- Inner hex shape -->
  <polygon points="256,80 400,168 400,344 256,432 112,344 112,168" fill="none" stroke="#00e5ff" stroke-width="4" stroke-linejoin="round" opacity="0.6"/>
  <!-- N letter -->
  <text x="256" y="320" font-family="Arial Black, Arial" font-size="200" font-weight="900" fill="#00e5ff" text-anchor="middle" opacity="0.95">N</text>
  <!-- Glow dot top -->
  <circle cx="256" cy="80" r="8" fill="#00e5ff"/>
  <circle cx="400" cy="168" r="6" fill="#00e5ff" opacity="0.7"/>
  <circle cx="400" cy="344" r="6" fill="#00e5ff" opacity="0.7"/>
  <circle cx="256" cy="432" r="8" fill="#ffb300"/>
  <circle cx="112" cy="344" r="6" fill="#00e5ff" opacity="0.7"/>
  <circle cx="112" cy="168" r="6" fill="#00e5ff" opacity="0.7"/>
</svg>
